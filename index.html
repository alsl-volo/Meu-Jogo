<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>🎤 Il Volo Quiz - Palco Final</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
  background:url("fundo.jpg.jpg") center/cover no-repeat fixed;
}

.overlay{
  min-height:100vh;
  padding:22px;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,215,0,0.32), transparent 28%),
    radial-gradient(circle at 80% 15%, rgba(255,215,0,0.25), transparent 30%),
    linear-gradient(rgba(0,0,0,0.52), rgba(0,0,0,0.82));
}

h1{
  color:gold;
  font-size:44px;
  text-shadow:0 0 18px gold, 0 0 35px black;
  margin-top:25px;
}

.subtitle{
  color:#ffeaa0;
  font-size:18px;
  margin-top:-10px;
  text-shadow:0 0 8px black;
}

.box{
  background:rgba(0,0,0,0.76);
  border-radius:28px;
  padding:26px;
  margin:28px auto;
  max-width:760px;
  box-shadow:0 0 38px rgba(255,215,0,0.85);
  border:1px solid rgba(255,215,0,0.7);
  backdrop-filter:blur(4px);
}

button{
  display:block;
  width:82%;
  margin:13px auto;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 14px rgba(0,0,0,0.5);
}

button:hover{
  transform:scale(1.04);
  box-shadow:0 0 22px gold;
}

.red{background:#e84b4b;color:white;}
.blue{background:#2f9cff;color:white;}
.yellow{background:#ffd21f;color:black;}
.green{background:#45d96b;color:black;}

.start{
  background:linear-gradient(135deg,gold,#fff2a0);
  color:black;
}

input{
  padding:13px;
  border-radius:14px;
  border:2px solid gold;
  font-size:17px;
  text-align:center;
  background:rgba(255,255,255,0.9);
}

.hidden{display:none;}

.musicBtn{
  position:fixed;
  top:18px;
  right:18px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(0,0,0,0.72);
  color:gold;
  font-size:24px;
  box-shadow:0 0 18px gold;
  border:1px solid rgba(255,215,0,0.8);
  z-index:20;
}

.musicBtn.on{
  background:gold;
  color:black;
  box-shadow:0 0 35px gold;
}

#contador{
  color:gold;
  font-size:20px;
}

#pergunta{
  font-size:28px;
  text-shadow:0 0 10px black;
}

.correct{
  background:#00a000 !important;
  color:white !important;
  box-shadow:0 0 25px #00ff66 !important;
}

.wrong{
  background:#b00000 !important;
  color:white !important;
  box-shadow:0 0 25px red !important;
}

#feedback{
  font-size:22px;
  min-height:30px;
  color:#ffeaa0;
}

#resultado{
  font-size:25px;
  color:gold;
  font-weight:bold;
  white-space:pre-line;
}

.sparkle{
  position:fixed;
  top:-15px;
  width:12px;
  height:12px;
  border-radius:50%;
  z-index:9999;
  animation:fall linear forwards;
  box-shadow:0 0 15px white;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

@media(max-width:700px){
  h1{font-size:34px;}
  .box{width:88%; padding:20px;}
  button{width:92%;}
}
</style>
</head>

<body>
<div class="overlay">

<h1>🎤 Il Volo Quiz 🎶</h1>

<button class="musicBtn" id="musicBtn" onclick="toggleMusic()">▶️</button>

<audio id="musica" loop>
  <source src="Il Volo - Il Mondo.mp3" type="audio/mpeg">
</audio>

<div class="box" id="startBox">
  <h2>Introduz o teu nome 👇</h2>
  <input id="nome" placeholder="Nome">
  <br><br>
  <button class="start" onclick="startGame()">▶️ Começar o Quiz</button>
</div>

<div class="box hidden" id="quizBox">
  <h3 id="contador"></h3>
  <h2 id="pergunta"></h2>

  <button class="red" onclick="responder(0)" id="a0"></button>
  <button class="blue" onclick="responder(1)" id="a1"></button>
  <button class="yellow" onclick="responder(2)" id="a2"></button>
  <button class="green" onclick="responder(3)" id="a3"></button>

  <div id="feedback"></div>
</div>

<div class="box hidden" id="fimBox">
  <h2>🏆 Resultado Final 🏆</h2>
  <p id="resultado"></p>
  <button class="start" onclick="location.reload()">🔁 Jogar outra vez</button>
</div>

</div>

<script>
let perguntas=[
{q:"De que país são os Il Volo?",a:["Portugal","Itália","França","Espanha"],c:1},
{q:"Quantos membros tem o grupo?",a:["2","3","4","5"],c:1},
{q:"Quem são os membros dos Il Volo?",a:["Piero, Ignazio e Gianluca","Marco, Luca e Paolo","Eros, Nek e Tiziano","Andrea, Matteo e Lorenzo"],c:0},
{q:"Qual música venceu Sanremo 2015?",a:["Grande Amore","Il Mondo","Capolavoro","Musica che resta"],c:0},
{q:"Que estilo é mais associado aos Il Volo?",a:["Pop lírico / crossover clássico","Rap","Rock pesado","Reggae"],c:0},
{q:"O nome 'Il Volo' significa:",a:["O Voo","A Voz","O Amor","A Luz"],c:0},
{q:"Que música levaram à Eurovisão em 2015?",a:["Grande Amore","Perfect","Hello","Imagine"],c:0},
{q:"Onde ficaram conhecidos ainda jovens?",a:["Ti lascio una canzone","The Voice","Got Talent","X Factor UK"],c:0},
{q:"Qual destas músicas é muito associada ao grupo?",a:["Il Mondo","Thriller","Bad Romance","Despacito"],c:0},
{q:"Qual destas foi apresentada em Sanremo 2024?",a:["Capolavoro","Billie Jean","Viva la Vida","Halo"],c:0},
{q:"Qual destas canções é dos Il Volo?",a:["Musica che resta","Rolling in the Deep","Radioactive","Shallow"],c:0},
{q:"Que compositor homenagearam num projeto especial?",a:["Ennio Morricone","Mozart","Beethoven","Bach"],c:0},
{q:"Quais são os tipos de voz do trio?",a:["Piero e Ignazio são tenores; Gianluca é barítono","Todos são tenores","Todos são barítonos","Todos são baixos"],c:0},
{q:"Qual deles é barítono?",a:["Gianluca","Piero","Ignazio","Nenhum"],c:0},
{q:"Qual frase define melhor o grupo?",a:["Trio vocal italiano de projeção internacional","Banda rock inglesa","DJ eletrónico","Grupo de dança espanhol"],c:0},
{q:"Qual é uma característica dos concertos deles?",a:["Elegância e ambiente clássico","Máscaras de terror","Roupa de futebol","Cenário de videojogo"],c:0},
{q:"Qual palavra combina melhor com Il Volo?",a:["Romantismo","Terror","Agressividade","Comédia"],c:0},
{q:"Qual destas NÃO é dos Il Volo?",a:["Thriller","Grande Amore","Capolavoro","Il Mondo"],c:0},
{q:"Qual é a melhor descrição do repertório deles?",a:["Canções italianas, clássicos e pop lírico","Só rap","Só eletrónica","Só punk rock"],c:0},
{q:"Qual música é uma das mais famosas do grupo?",a:["Grande Amore","Lose Yourself","Shape of You","Believer"],c:0},
{q:"Qual destes é o apelido de Piero?",a:["Barone","Ginoble","Boschetto","Bocelli"],c:0},
{q:"Qual destes é o apelido de Ignazio?",a:["Boschetto","Barone","Ginoble","Ramazzotti"],c:0},
{q:"Qual destes é o apelido de Gianluca?",a:["Ginoble","Boschetto","Barone","Mengoni"],c:0},
{q:"Qual destas músicas tem uma ligação forte ao romantismo do grupo?",a:["Grande Amore","Smells Like Teen Spirit","Lose Yourself","Bad Guy"],c:0},
{q:"Il Volo mistura música clássica com:",a:["Pop","Trap pesado","Punk","Techno"],c:0},
{q:"Qual destas opções combina melhor com o palco dos Il Volo?",a:["Orquestra, elegância e vozes fortes","DJ e luzes de discoteca","Rap battle","Dança hip-hop"],c:0},
{q:"Em que idioma cantam muitas das suas músicas?",a:["Italiano","Japonês","Alemão","Russo"],c:0},
{q:"Qual destas canções é ligada ao projeto Morricone?",a:["The Ecstasy of Gold","Thriller","Umbrella","Toxic"],c:0},
{q:"Qual é o tipo de grupo dos Il Volo?",a:["Trio vocal","Banda de guitarras","Dupla eletrónica","Grupo de dança"],c:0},
{q:"Quem costuma cantar com voz mais grave no trio?",a:["Gianluca","Piero","Ignazio","Nenhum"],c:0}
];

let atual=0;
let pontos=0;
let nome="";
let musicaOn=false;
let bloqueado=false;

function toggleMusic(){
  let audio=document.getElementById("musica");
  let btn=document.getElementById("musicBtn");

  if(!musicaOn){
    audio.volume=0.65;
    audio.play();
    btn.innerText="⏸️";
    btn.classList.add("on");
    musicaOn=true;
  }else{
    audio.pause();
    btn.innerText="▶️";
    btn.classList.remove("on");
    musicaOn=false;
  }
}

function startGame(){
  nome=document.getElementById("nome").value.trim() || "Jogador";

  document.getElementById("startBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");

  if(!musicaOn){ toggleMusic(); }

  mostrar();
}

function mostrar(){
  bloqueado=false;
  let p=perguntas[atual];

  document.getElementById("contador").innerText="Pergunta "+(atual+1)+" / "+perguntas.length;
  document.getElementById("pergunta").innerText=p.q;
  document.getElementById("feedback").innerText="";

  for(let i=0;i<4;i++){
    let btn=document.getElementById("a"+i);
    btn.innerText=p.a[i];
    btn.classList.remove("correct","wrong");
  }
}

function responder(i){
  if(bloqueado) return;
  bloqueado=true;

  let certa=perguntas[atual].c;

  if(i===certa){
    pontos++;
    document.getElementById("a"+i).classList.add("correct");
    document.getElementById("feedback").innerText="✅ Bravo! Resposta certa!";
  }else{
    document.getElementById("a"+i).classList.add("wrong");
    document.getElementById("a"+certa).classList.add("correct");
    document.getElementById("feedback").innerText="❌ Ups! A correta era: "+perguntas[atual].a[certa];
  }

  setTimeout(()=>{
    atual++;
    if(atual<perguntas.length){
      mostrar();
    }else{
      fim();
    }
  },1300);
}

function fim(){
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("fimBox").classList.remove("hidden");

  let msg="";
  if(pontos>=27){ msg="🏆 Fantástico! És uma verdadeira fã dos Il Volo!"; }
  else if(pontos>=22){ msg="✨ Muito bom! Conheces muito bem o trio!"; }
  else if(pontos>=15){ msg="🎶 Bom resultado! Continua a jogar!"; }
  else{ msg="💙 Continua a treinar, Volover!"; }

  document.getElementById("resultado").innerText =
    nome+" fez "+pontos+" pontos de "+perguntas.length+" 🎉\n"+msg;

  brilhosFinais();
}

function brilhosFinais(){
  for(let i=0;i<160;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    s.style.background=["gold","#fff2a0","white","#ff4d4d","#4da6ff"][Math.floor(Math.random()*5)];
    s.style.animationDuration=(Math.random()*3+2)+"s";
    s.style.animationDelay=(Math.random()*0.8)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),6000);
  }
}
</script>

</body>
</html>
