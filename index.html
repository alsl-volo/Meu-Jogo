<!DOCTYPE html>
<html>
<head>
<title>🎤 Il Volo Quiz</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(to bottom, #0b1a3a, #000);
    color: white;
}

h1 {
    color: gold;
}

#quiz {
    margin-top: 30px;
}

button {
    width: 200px;
    padding: 15px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.correct { background: green; color: white; }
.wrong { background: red; color: white; }

.option1 { background: #ff4d4d; }
.option2 { background: #4da6ff; }
.option3 { background: #ffd11a; color:black; }
.option4 { background: #66ff66; color:black; }

#score {
    font-size: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎤 Il Volo Quiz</h1>

<audio autoplay loop>
    <source src="Il Volo - Grande amore.mp3" type="audio/mpeg">
</audio>

<div id="quiz">
    <h2 id="question">Carregue em começar!</h2>

    <div>
        <button class="option1" onclick="checkAnswer(0)"></button>
        <button class="option2" onclick="checkAnswer(1)"></button>
    </div>
    <div>
        <button class="option3" onclick="checkAnswer(2)"></button>
        <button class="option4" onclick="checkAnswer(3)"></button>
    </div>

    <br><br>
    <button onclick="startQuiz()">▶️ Começar</button>

    <div id="score">Pontos: 0</div>
</div>

<script>
let questions = [
{
    q: "Quem são os membros dos Il Volo?",
    options: ["Piero, Ignazio, Gianluca", "Marco, Luca, Paolo", "Luis, João, Pedro", "Bruno, Miguel, Tiago"],
    answer: 0
},
{
    q: "Em que ano ganharam Sanremo com Grande Amore?",
    options: ["2012", "2015", "2018", "2020"],
    answer: 1
},
{
    q: "Quem é o mais novo?",
    options: ["Piero", "Ignazio", "Gianluca", "Todos iguais"],
    answer: 2
}
];

let current = 0;
let score = 0;

function startQuiz() {
    current = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    document.getElementById("question").innerText = questions[current].q;

    let buttons = document.querySelectorAll("button.option1, button.option2, button.option3, button.option4");

    buttons.forEach((btn, i) => {
        btn.innerText = questions[current].options[i];
        btn.classList.remove("correct", "wrong");
    });
}

function checkAnswer(i) {
    let buttons = document.querySelectorAll("button.option1, button.option2, button.option3, button.option4");

    if (i === questions[current].answer) {
        buttons[i].classList.add("correct");
        score++;
    } else {
        buttons[i].classList.add("wrong");
    }

    document.getElementById("score").innerText = "Pontos: " + score;

    setTimeout(() => {
        current++;
        if (current < questions.length) {
            showQuestion();
        } else {
            document.getElementById("question").innerText = "Fim do Quiz! 🎉";
        }
    }, 1000);
}
</script>

</body>
</html>
