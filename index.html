<!DOCTYPE html>
<html>
<head>
  <title>Jogo de Ritmo</title>
  <style>
    body { text-align: center; font-family: Arial; }
    #game {
      width: 300px;
      height: 400px;
      border: 2px solid black;
      margin: auto;
      position: relative;
      overflow: hidden;
    }
    .note {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      left: 125px;
      top: 0;
    }
    #hitZone {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: lightgreen;
    }
  </style>
</head>
<body>

<h1>🎵 Jogo de Ritmo</h1>
<p>Carrega na tecla SPACE quando o quadrado chegar ao verde!</p>

<div id="game">
  <div id="hitZone"></div>
</div>

<p>Pontuação: <span id="score">0</span></p>

<script>
let game = document.getElementById("game");
let score = 0;

function createNote() {
  let note = document.createElement("div");
  note.classList.add("note");
  game.appendChild(note);

  let position = 0;

  let fall = setInterval(() => {
    position += 5;
    note.style.top = position + "px";

    if (position > 340) {
      clearInterval(fall);
      note.remove();
    }
  }, 50);

  document.addEventListener("keydown", function handler(e) {
    if (e.code === "Space") {
      if (position > 300 && position < 360) {
        score++;
        document.getElementById("score").innerText = score;
        note.remove();
        clearInterval(fall);
      }
      document.removeEventListener("keydown", handler);
    }
  });
}

// cria notas a cada 2 segundos
setInterval(createNote, 2000);
</script>

</body>
</html>
