<!DOCTYPE html>
<html>
<head>
<title>Il Volo Rhythm 🎶</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(to bottom, #0b1a3a, #000);
    color: white;
}

h1 {
    color: gold;
}

#game {
    width: 300px;
    height: 400px;
    border: 3px solid gold;
    margin: auto;
    position: relative;
    overflow: hidden;
    background: black;
}

.note {
    width: 50px;
    height: 50px;
    background: gold;
    position: absolute;
    top: 0;
    border-radius: 10px;
}

#zone {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: green;
}

button {
    padding: 10px;
    margin: 5px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🎶 Il Volo Rhythm 🎶</h1>
<p>Carrega SPACE quando a nota chega ao verde</p>

<button onclick="startGame()">Iniciar</button>
<button onclick="pauseGame()">Pausar</button>

<div id="score">Pontos: 0</div>

<div id="game">
    <div id="zone"></div>
</div>

<script>
let game = document.getElementById("game");
let score = 0;
let running = false;

function startGame() {
    running = true;
}

function pauseGame() {
    running = false;
}

function createNote() {
    if (!running) return;

    let note = document.createElement("div");
    note.classList.add("note");
    note.style.left = Math.random() * 250 + "px";

    game.appendChild(note);

    let position = 0;

    let fall = setInterval(() => {
        if (!running) return;

        position += 5;
        note.style.top = position + "px";

        if (position > 320) {
            clearInterval(fall);
            note.remove();
        }
    }, 50);

    document.addEventListener("keydown", function(e) {
        if (e.code === "Space" && position > 320) {
            score++;
            document.getElementById("score").innerText = "Pontos: " + score;
            note.remove();
        }
    });
}

setInterval(createNote, 1000);
</script>

</body>
</html>
