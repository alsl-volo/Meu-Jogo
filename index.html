<!DOCTYPE html>
<html>
<head>
<title>🎤 Il Volo Quiz</title>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial, sans-serif;
  background:linear-gradient(to bottom,#071733,#000);
  color:white;
}

h1{
  color:gold;
  font-size:42px;
  margin-top:35px;
}

#quizBox{
  max-width:900px;
  margin:auto;
  padding:25px;
}

#question{
  font-size:28px;
  margin:25px;
}

#progress{
  color:gold;
  font-size:18px;
}

.answers{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  max-width:700px;
  margin:30px auto;
}

button{
  padding:18px;
  font-size:19px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  font-weight:bold;
}

.option1{background:#ff4d4d;}
.option2{background:#4da6ff;}
.option3{background:#ffd11a;}
.option4{background:#55ee55;}

.correct{
  background:#00a000 !important;
  color:white;
}

.wrong{
  background:#b00000 !important;
  color:white;
}

#startBtn{
  background:gold;
  color:black;
  width:280px;
  margin-top:20px;
}

#score{
  font-size:24px;
  margin-top:25px;
}

audio{
  margin:15px;
}
</style>
</head>

<body>

<h1>🎤 Il Volo Quiz 🎶</h1>

<audio id="music" controls loop>
  <source src="Il%20Volo%20-%20Grande%20amore.mp3" type="audio/mpeg">
</audio>

<div id="quizBox">
  <div id="progress">Pergunta 0 / 20</div>
  <h2 id="question">Clica em começar para iniciar o quiz!</h2>

  <div class="answers">
    <button class="option1" onclick="checkAnswer(0)"></button>
    <button class="option2" onclick="checkAnswer(1)"></button>
    <button class="option3" onclick="checkAnswer(2)"></button>
    <button class="option4" onclick="checkAnswer(3)"></button>
  </div>

  <button id="startBtn" onclick="startQuiz()">▶️ Começar / Recomeçar</button>

  <div id="score">Pontos: 0</div>
</div>

<script>
let questions = [
  {
    q:"Quem são os três membros dos Il Volo?",
    options:["Piero Barone, Ignazio Boschetto e Gianluca Ginoble","Marco, Luca e Paolo","Andrea, Matteo e Lorenzo","Piero, Eros e Tiziano"],
    answer:0
  },
  {
    q:"De que país são os Il Volo?",
    options:["Portugal","Itália","Espanha","França"],
    answer:1
  },
  {
    q:"Qual foi a música com que venceram Sanremo em 2015?",
    options:["Grande Amore","Capolavoro","Musica che resta","Il Mondo"],
    answer:0
  },
  {
    q:"Em que festival italiano venceram em 2015?",
    options:["Festival de Sanremo","Festival de Veneza","Festival de Roma","Festival de Milão"],
    answer:0
  },
  {
    q:"Quantos membros tem o grupo Il Volo?",
    options:["2","3","4","5"],
    answer:1
  },
  {
    q:"Quais são os tipos de voz dos três membros?",
    options:["Piero e Ignazio são tenores, Gianluca é barítono","Todos são tenores","Todos são barítonos","Piero é soprano, Ignazio é tenor e Gianluca é baixo"],
    answer:0
  },
  {
    q:"Qual é o estilo mais associado aos Il Volo?",
    options:["Pop lírico / crossover clássico","Rap","Heavy metal","Reggae"],
    answer:0
  },
  {
    q:"O nome 'Il Volo' significa aproximadamente:",
    options:["O Voo","A Voz","O Amor","A Canção"],
    answer:0
  },
  {
    q:"Que música representou os Il Volo na Eurovisão de 2015?",
    options:["Grande Amore","Nessun Dorma","O Sole Mio","Ancora"],
    answer:0
  },
  {
    q:"Qual destes temas é associado aos Il Volo?",
    options:["Il Mondo","Despacito","Bad Romance","Shape of You"],
    answer:0
  },
  {
    q:"Qual destas canções é dos Il Volo?",
    options:["Musica che resta","Hello","Perfect","Imagine"],
    answer:0
  },
  {
    q:"Qual destas canções é dos Il Volo?",
    options:["Capolavoro","Thriller","Viva la Vida","Billie Jean"],
    answer:0
  },
  {
    q:"Em que programa italiano ficaram conhecidos ainda jovens?",
    options:["Ti lascio una canzone","The Voice Portugal","Got Talent Espanha","X Factor UK"],
    answer:0
  },
  {
    q:"O que torna muitas atuações dos Il Volo especiais?",
    options:["A harmonia entre três vozes","Dança hip-hop","DJ set eletrónico","Guitarras de heavy metal"],
    answer:0
  },
  {
    q:"Qual destes álbuns/projetos está associado aos Il Volo?",
    options:["Il Volo sings Morricone","Midnights","Divide","After Hours"],
    answer:0
  },
  {
    q:"Que compositor italiano foi homenageado pelos Il Volo num projeto especial?",
    options:["Ennio Morricone","Mozart","Beethoven","Vivaldi"],
    answer:0
  },
  {
    q:"Qual é uma característica visual comum nos concertos deles?",
    options:["Elegância e ambiente clássico","Máscaras de terror","Roupa de futebol","Cenários de desenho animado"],
    answer:0
  },
  {
    q:"Qual destas frases combina melhor com Il Volo?",
    options:["Trio vocal italiano de grande projeção internacional","Banda de rock inglesa","Dupla pop americana","Grupo de dança espanhol"],
    answer:0
  },
  {
    q:"Qual destas opções é uma canção romântica muito associada ao grupo?",
    options:["Grande Amore","We Will Rock You","Smells Like Teen Spirit","Lose Yourself"],
    answer:0
  },
  {
    q:"Qual é a melhor descrição do repertório dos Il Volo?",
    options:["Canções italianas, clássicos e pop lírico","Trap e rap urbano","Música eletrónica pura","Punk rock"],
    answer:0
  }
];

let current = 0;
let score = 0;
let answered = false;

let buttons = document.querySelectorAll(".option1, .option2, .option3, .option4");

function startQuiz(){
  current = 0;
  score = 0;
  answered = false;

  document.getElementById("score").innerText = "Pontos: 0";

  let music = document.getElementById("music");
  music.volume = 0.35;
  music.play().catch(function(){
    alert("Carrega no botão Play da música para ela começar 🎶");
  });

  showQuestion();
}

function showQuestion(){
  answered = false;

  document.getElementById("progress").innerText = "Pergunta " + (current + 1) + " / " + questions.length;
  document.getElementById("question").innerText = questions[current].q;

  buttons.forEach((btn, i) => {
    btn.innerText = questions[current].options[i];
    btn.classList.remove("correct","wrong");
    btn.disabled = false;
  });
}

function checkAnswer(i){
  if(answered) return;
  answered = true;

  let correct = questions[current].answer;

  if(i === correct){
    buttons[i].classList.add("correct");
    score++;
  } else {
    buttons[i].classList.add("wrong");
    buttons[correct].classList.add("correct");
  }

  document.getElementById("score").innerText = "Pontos: " + score;

  setTimeout(() => {
    current++;

    if(current < questions.length){
      showQuestion();
    } else {
      document.getElementById("question").innerText = "Fim do Quiz! 🎉 Fizeste " + score + " em " + questions.length + "!";
      document.getElementById("progress").innerText = "Quiz terminado";

      buttons.forEach(btn => {
        btn.innerText = "";
        btn.disabled = true;
        btn.classList.remove("correct","wrong");
      });
    }
  }, 1200);
}
</script>

</body>
</html>
