<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Il Volo Quiz 🎤</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;

  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
              url('fundo.jpg.jpg');
  background-size: cover;
}

h1 {
  color: gold;
  text-shadow: 0 0 15px gold;
}

.container {
  background: rgba(0,0,0,0.7);
  padding:20px;
  border-radius:20px;
  width: 80%;
  margin:auto;
  margin-top:20px;
  box-shadow: 0 0 20px gold;
}

button {
  display:block;
  margin:10px auto;
  padding:15px;
  width:60%;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  color:white;
}

.red { background:#ff4d4d; }
.blue { background:#4da6ff; }
.yellow { background:#ffcc00; color:black; }
.green { background:#4dff4d; color:black; }

#startBtn {
  background:gold;
  color:black;
  padding:15px 30px;
}

#nameInput {
  padding:10px;
  border-radius:10px;
  border:none;
  width:200px;
}
</style>
</head>

<body>

<h1>🎤 Il Volo Quiz 🎶</h1>

<audio id="music" loop>
  <source src="Il Volo - Il Mondo.mp3" type="audio/mpeg">
</audio>

<div id="startScreen" class="container">
  <h2>Introduz o teu nome 👇</h2>
  <input id="nameInput" placeholder="Nome">
  <br><br>
  <button id="startBtn" onclick="startGame()">Começar</button>
</div>

<div id="quiz" class="container" style="display:none;">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p id="score"></p>
</div>

<div id="end" class="container" style="display:none;">
  <h2>🏆 Ranking Final 🏆</h2>
  <div id="ranking"></div>
  <button id="startBtn" onclick="restart()">Jogar outra vez</button>
</div>

<script>
let player = "";
let score = 0;
let current = 0;

let ranking = JSON.parse(localStorage.getItem("ranking") || "[]");

let questions = [
  {q:"Quem são os membros?", a:["Piero, Ignazio e Gianluca","Marco, Luca e Paolo","Eros, Nek e Tiziano","Coldplay"], c:0},
  {q:"De que país são?", a:["Espanha","França","Itália","Brasil"], c:2},
  {q:"Ano de formação?", a:["2009","2015","2000","2012"], c:0},
  {q:"Canção famosa?", a:["Grande Amore","Despacito","Hello","Shape of You"], c:0},
  {q:"Participaram em?", a:["Sanremo","Eurovisão","X Factor","Todos"], c:3},
  {q:"Voz de Piero?", a:["Tenor","Barítono","Baixo","Soprano"], c:1},
  {q:"Nome de Gianluca?", a:["Ginoble","Bocelli","Ramazzotti","Pausini"], c:0},
  {q:"Idioma principal?", a:["Italiano","Inglês","Espanhol","Francês"], c:0},
  {q:"Música Il Mondo?", a:["Sim","Não","Talvez","Nunca"], c:0},
  {q:"Estilo?", a:["Pop lírico","Rock","Rap","Jazz"], c:0},
  {q:"Ano Sanremo vitória?", a:["2015","2010","2020","2005"], c:0},
  {q:"Nome do grupo?", a:["Il Volo","Trio X","Tenores","Opera Pop"], c:0},
  {q:"Origem TV?", a:["Ti Lascio una Canzone","The Voice","Idol","Got Talent"], c:0},
  {q:"Tipo de música?", a:["Clássico-pop","Eletrónica","Metal","Funk"], c:0},
  {q:"Instrumento principal?", a:["Voz","Guitarra","Piano","Bateria"], c:0},
  {q:"Quantos membros?", a:["3","2","4","5"], c:0},
  {q:"Idioma canções?", a:["Italiano e Inglês","Só inglês","Só espanhol","Português"], c:0},
  {q:"Nome Ignazio?", a:["Boschetto","Rossi","Verdi","Bianchi"], c:0},
  {q:"Género musical?", a:["Ópera pop","Trap","House","Techno"], c:0},
  {q:"Fãs chamam-se?", a:["Volovers","Directioners","Beliebers","Swifties"], c:0}
];

function startGame(){
  player = document.getElementById("nameInput").value;
  if(player==""){ alert("Escreve o nome!"); return; }

  document.getElementById("music").play();

  document.getElementById("startScreen").style.display="none";
  document.getElementById("quiz").style.display="block";

  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = (current+1)+"/20 - "+q.q;

  let html="";
  q.a.forEach((ans,i)=>{
    let colors=["red","blue","yellow","green"];
    html+=`<button class="${colors[i]}" onclick="answer(${i})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML=html;
  document.getElementById("score").innerText="Pontos: "+score;
}

function answer(i){
  if(i==questions[current].c) score++;

  current++;

  if(current<questions.length){
    showQuestion();
  } else {
    endGame();
  }
}

function endGame(){
  ranking.push({name:player, score:score});
  ranking.sort((a,b)=>b.score-a.score);

  localStorage.setItem("ranking", JSON.stringify(ranking));

  document.getElementById("quiz").style.display="none";
  document.getElementById("end").style.display="block";

  let html="";
  ranking.slice(0,5).forEach((p,i)=>{
    html+=`<p>${i+1}º ${p.name} - ${p.score} pts</p>`;
  });

  document.getElementById("ranking").innerHTML=html;

  confetti();
}

function restart(){
  location.reload();
}

function confetti(){
  for(let i=0;i<50;i++){
    let div=document.createElement("div");
    div.style.position="fixed";
    div.style.width="5px";
    div.style.height="5px";
    div.style.background="gold";
    div.style.top="0px";
    div.style.left=Math.random()*100+"%";
    document.body.appendChild(div);

    let fall=setInterval(()=>{
      div.style.top=parseInt(div.style.top)+5+"px";
      if(parseInt(div.style.top)>window.innerHeight){
        clearInterval(fall);
        div.remove();
      }
    },20);
  }
}
</script>

</body>
</html>
