<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>🎤 Il Volo Quiz</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
  background:url("fundo.jpg.jpg") center/cover no-repeat fixed;
}

.overlay{
  background:rgba(0,0,0,0.72);
  min-height:100vh;
  padding:20px;
}

h1{
  color:gold;
  text-shadow:0 0 18px gold, 0 0 8px black;
}

.box{
  background:rgba(0,0,0,0.82);
  border-radius:22px;
  padding:22px;
  margin:25px auto;
  max-width:650px;
  box-shadow:0 0 28px gold;
  border:1px solid rgba(255,215,0,0.5);
}

button{
  display:block;
  width:80%;
  margin:12px auto;
  padding:15px;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.yellow{background:#ffd11a;color:black;}
.green{background:#5cd65c;color:black;}

.start{
  background:gold;
  color:black;
}

input{
  padding:12px;
  border-radius:12px;
  border:2px solid gold;
  font-size:17px;
  text-align:center;
}

.hidden{display:none;}

/* BOTÃO MÚSICA PREMIUM */
.musicBtn{
  position:fixed;
  top:18px;
  right:18px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:rgba(0,0,0,0.75);
  color:gold;
  font-size:24px;
  box-shadow:0 0 18px gold;
  border:none;
  cursor:pointer;
}

.musicBtn.on{
  background:gold;
  color:black;
  box-shadow:0 0 28px gold;
}
</style>
</head>

<body>
<div class="overlay">

<h1>🎤 Il Volo Quiz 🎶</h1>

<button class="musicBtn" id="musicBtn" onclick="toggleMusic()">▶️</button>

<audio id="musica" loop>
  <source src="Il Volo - Il Mondo.mp3" type="audio/mpeg">
</audio>

<div class="box" id="startBox">
  <h2>Introduz o teu nome 👇</h2>
  <input id="nome" placeholder="Nome">
  <br><br>
  <button class="start" onclick="startGame()">▶️ Começar</button>
</div>

<div class="box hidden" id="quizBox">
  <h3 id="contador"></h3>
  <h2 id="pergunta"></h2>

  <button class="red" onclick="responder(0)" id="a0"></button>
  <button class="blue" onclick="responder(1)" id="a1"></button>
  <button class="yellow" onclick="responder(2)" id="a2"></button>
  <button class="green" onclick="responder(3)" id="a3"></button>
</div>

<div class="box hidden" id="fimBox">
  <h2>🏆 Resultado Final</h2>
  <p id="resultado"></p>
  <button class="start" onclick="location.reload()">🔁 Jogar outra vez</button>
</div>

</div>

<script>

let perguntas=[
{q:"De que país são os Il Volo?",a:["Portugal","Itália","França","Espanha"],c:1},
{q:"Quantos membros tem o grupo?",a:["2","3","4","5"],c:1},
{q:"Quem são os membros?",a:["Piero, Ignazio e Gianluca","Marco, Luca e Paolo","Eros, Nek e Tiziano","Andrea, Matteo e Lorenzo"],c:0},
{q:"Qual música venceu Sanremo 2015?",a:["Grande Amore","Il Mondo","Capolavoro","Musica che resta"],c:0},
{q:"Que estilo é mais associado aos Il Volo?",a:["Pop lírico","Rap","Rock pesado","Reggae"],c:0},
{q:"O nome 'Il Volo' significa:",a:["O Voo","A Voz","O Amor","A Luz"],c:0},
{q:"Que música levaram à Eurovisão em 2015?",a:["Grande Amore","Perfect","Hello","Imagine"],c:0},
{q:"Onde ficaram conhecidos?",a:["Ti lascio una canzone","The Voice","Got Talent","X Factor"],c:0},
{q:"Qual destas músicas é deles?",a:["Il Mondo","Thriller","Bad Romance","Despacito"],c:0},
{q:"Qual destas NÃO é deles?",a:["Thriller","Grande Amore","Capolavoro","Il Mondo"],c:0}
];

let atual=0;
let pontos=0;
let nome="";
let musicaOn=false;

function toggleMusic(){
  let audio=document.getElementById("musica");
  let btn=document.getElementById("musicBtn");

  if(!musicaOn){
    audio.volume=0.6;
    audio.play();
    btn.innerText="⏸️";
    btn.classList.add("on");
    musicaOn=true;
  }else{
    audio.pause();
    btn.innerText="▶️";
    btn.classList.remove("on");
    musicaOn=false;
  }
}

function startGame(){
  nome=document.getElementById("nome").value || "Jogador";

  document.getElementById("startBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");

  if(!musicaOn){
    toggleMusic();
  }

  mostrar();
}

function mostrar(){
  let p=perguntas[atual];

  document.getElementById("contador").innerText="Pergunta "+(atual+1)+" / "+perguntas.length;
  document.getElementById("pergunta").innerText=p.q;

  for(let i=0;i<4;i++){
    document.getElementById("a"+i).innerText=p.a[i];
  }
}

function responder(i){
  if(i===perguntas[atual].c){
    pontos++;
  }

  atual++;

  if(atual<perguntas.length){
    mostrar();
  }else{
    fim();
  }
}

function fim(){
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("fimBox").classList.remove("hidden");

  document.getElementById("resultado").innerText =
    nome+" fez "+pontos+" pontos de "+perguntas.length+" 🎉";
}

</script>

</body>
</html>
