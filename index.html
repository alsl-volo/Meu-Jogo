<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>🎤 Il Volo Quiz</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;

  background: url("fundo.jpg.jpg") center/cover no-repeat fixed;
}

.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
  padding: 20px;
}

h1 {
  color: gold;
  text-shadow: 0 0 15px gold;
}

.box {
  background: rgba(0,0,0,0.85);
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  max-width: 600px;
  box-shadow: 0 0 25px gold;
}

button {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.red { background: #ff4d4d; }
.blue { background: #4da6ff; }
.yellow { background: #ffd11a; color:black;}
.green { background: #5cd65c; }

.start {
  background: gold;
  color: black;
  font-weight: bold;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: 2px solid gold;
  font-size: 16px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>
<div class="overlay">

<h1>🎤 Il Volo Quiz 🎶</h1>

<audio id="musica" loop>
  <source src="Il Volo - Il Mondo.mp3" type="audio/mpeg">
</audio>

<div class="box" id="startBox">
  <h2>Introduz o teu nome 👇</h2>
  <input id="nome" placeholder="Nome"><br><br>
  <button class="start" onclick="startGame()">▶️ Começar</button>
</div>

<div class="box hidden" id="quizBox">
  <h3 id="contador"></h3>
  <h2 id="pergunta"></h2>

  <button class="red" onclick="responder(0)" id="a0"></button>
  <button class="blue" onclick="responder(1)" id="a1"></button>
  <button class="yellow" onclick="responder(2)" id="a2"></button>
  <button class="green" onclick="responder(3)" id="a3"></button>
</div>

<div class="box hidden" id="fimBox">
  <h2>🏆 Resultado Final</h2>
  <p id="resultado"></p>
  <button class="start" onclick="location.reload()">Jogar outra vez</button>
</div>

</div>

<script>

let perguntas = [
{q:"De que país são os Il Volo?", a:["Portugal","Itália","França","Espanha"], c:1},
{q:"Quantos membros tem o grupo?", a:["2","3","4","5"], c:1},
{q:"Qual destas músicas é deles?", a:["Grande Amore","Thriller","Despacito","Hello"], c:0},
{q:"Quem tem voz tenor?", a:["Todos","Só um","Nenhum","Dois"], c:0},
{q:"Como se chama um membro?", a:["Gianluca","Cristiano","Luis","Marco"], c:0},
{q:"Qual estilo musical?", a:["Rock","Ópera Pop","Rap","Jazz"], c:1},
{q:"Qual concurso os lançou?", a:["X Factor","Amici","Ti Lascio una Canzone","The Voice"], c:2},
{q:"Qual destas é deles?", a:["Il Mondo","Shape of You","Halo","Bad Romance"], c:0},
{q:"Ano de formação?", a:["2009","2015","2000","1995"], c:0},
{q:"Quem é Piero?", a:["Tenor","DJ","Produtor","Ator"], c:0},
{q:"Quem é Ignazio?", a:["Tenor","Baterista","Pianista","Guitarrista"], c:0},
{q:"Quem é Gianluca?", a:["Tenor","Rapper","Ator","Comediante"], c:0},
{q:"Cantam em que língua?", a:["Italiano","Inglês","Ambas","Nenhuma"], c:2},
{q:"Ganharam Sanremo com?", a:["Grande Amore","Il Mondo","Capolavoro","O Sole Mio"], c:0},
{q:"Qual NÃO é deles?", a:["Thriller","Grande Amore","Il Mondo","Capolavoro"], c:0}
];

let atual = 0;
let pontos = 0;
let nome = "";

function startGame(){
  nome = document.getElementById("nome").value || "Jogador";

  document.getElementById("startBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");

  // 🎵 tocar música
  let audio = document.getElementById("musica");
  audio.volume = 0.6;
  audio.play();

  mostrar();
}

function mostrar(){
  let p = perguntas[atual];

  document.getElementById("contador").innerText = "Pergunta " + (atual+1) + " / " + perguntas.length;
  document.getElementById("pergunta").innerText = p.q;

  for(let i=0;i<4;i++){
    document.getElementById("a"+i).innerText = p.a[i];
  }
}

function responder(i){
  if(i === perguntas[atual].c){
    pontos++;
  }

  atual++;

  if(atual < perguntas.length){
    mostrar();
  } else {
    fim();
  }
}

function fim(){
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("fimBox").classList.remove("hidden");

  document.getElementById("resultado").innerText =
    nome + " fez " + pontos + " pontos de " + perguntas.length + " 🎉";
}

</script>

</body>
</html>
